services:
  mimotts:
    build: .
    container_name: mimotts
    restart: unless-stopped
    ports:
      - "7117:7117"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      ADDR: ":7117"
      DATA_DIR: "/app/data"
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
    volumes:
      - ./data:/app/data
      - ./data/call-logs:/app/data/call-logs
